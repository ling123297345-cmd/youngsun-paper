<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f2b1a" />
  <title>You're offline — YOUNGSUN PAPER</title>

  <style>
    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens (mirrors main site) ───────────────── */
    :root {
      --forest: #0f2b1a;
      --forest-light: #163825;
      --gold: #c8923f;
      --gold-light: #d4a858;
      --paper: #faf7f2;
      --paper-warm: #f3efe7;
      --ink: #1a1a1a;
      --ink-light: #2d2d2d;
      --muted: #6b7280;
      --white: #ffffff;
    }

    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Subtle background texture ──────────────────────── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(15,43,26,0.3) 2px, rgba(15,43,26,0.3) 2.1px);
      z-index: 0;
      pointer-events: none;
    }

    .offline-card {
      position: relative;
      z-index: 1;
      max-width: 440px;
      width: 100%;
    }

    /* ── Logo mark ──────────────────────────────────────── */
    .logo-mark {
      display: inline-block;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--forest-light), var(--forest));
      border-radius: 24px;
      margin-bottom: 32px;
      position: relative;
      box-shadow: 0 12px 40px rgba(15,43,26,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .logo-mark::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: radial-gradient(ellipse at 50% 30%, rgba(200,146,63,0.15) 0%, transparent 70%);
    }
    .logo-mark svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Typography ─────────────────────────────────────── */
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--forest);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 36px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Connection indicator ───────────────────────────── */
    .connection-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 8px;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ── Buttons ────────────────────────────────────────── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      min-width: 220px;
    }
    .btn-primary {
      background: var(--forest);
      color: var(--white);
      box-shadow: 0 2px 12px rgba(15,43,26,0.18);
    }
    .btn-primary:hover { background: var(--forest-light); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(15,43,26,0.25); }
    .btn-outline {
      background: transparent;
      color: var(--forest);
      border: 1.5px solid rgba(15,43,26,0.2);
    }
    .btn-outline:hover { background: rgba(15,43,26,0.04); border-color: rgba(15,43,26,0.35); }

    /* ── Gold line accent ───────────────────────────────── */
    .gold-line {
      width: 40px;
      height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    /* ── Footer info ────────────────────────────────────── */
    .footer-note {
      margin-top: 48px;
      font-size: 12px;
      color: rgba(107,114,128,0.5);
    }
    .footer-note span { color: var(--gold); font-weight: 600; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      h1 { color: var(--white); }
      p { color: #9ca3af; }
      .btn-outline { color: var(--white); border-color: rgba(255,255,255,0.2); }
      .btn-outline:hover { background: rgba(255,255,255,0.06); }
    }
  </style>
</head>
<body>

  <div class="offline-card">
    <!-- Logo mark -->
    <div class="logo-mark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <text x="50" y="42" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="white">Y</text>
        <text x="50" y="72" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="#c8923f">P</text>
      </svg>
    </div>

    <!-- Gold accent -->
    <div class="gold-line"></div>

    <h1>You're Offline</h1>
    <p>
      <span class="connection-dot"></span> No internet connection detected.<br />
      Don't worry — your previously viewed products and guides are still available.
    </p>

    <div class="actions">
      <button class="btn btn-primary" onclick="location.reload()" id="retryBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15.9-5.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15.9 5.7L3 16"/></svg>
        Try Again
      </button>
      <a href="/" class="btn btn-outline">Go to Home Page</a>
    </div>

    <p class="footer-note">
      <span>YOUNGSUN PAPER</span> &mdash; Premium Paper &amp; Board Since 2002
    </p>
  </div>

  <!-- Auto-retry logic: ping every 15 seconds, auto-reload on reconnect -->
  <script>
    (function() {
      var retryBtn = document.getElementById("retryBtn");
      var retrying = false;

      function ping() {
        fetch("/offline.html?ping=" + Date.now(), { method: "HEAD", cache: "no-store" })
          .then(function() {
            // Network is back — reload
            window.location.reload();
          })
          .catch(function() { /* still offline */ });
      }

      // Manual retry
      if (retryBtn) {
        retryBtn.addEventListener("click", function() {
          if (retrying) return;
          retrying = true;
          retryBtn.textContent = "Checking…";
          retryBtn.style.opacity = "0.7";
          retryBtn.disabled = true;
          ping();
          // Reset after 3 seconds so user can try again
          setTimeout(function() {
            retrying = false;
            retryBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15.9-5.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15.9 5.7L3 16"/></svg>Try Again';
            retryBtn.style.opacity = "1";
            retryBtn.disabled = false;
          }, 3000);
        });
      }

      // Auto-ping every 15 seconds
      setInterval(ping, 15000);

      // Listen for online event (works when browser detects network change)
      window.addEventListener("online", function() {
        window.location.reload();
      });
    })();
  </script>

</body>
</html>
